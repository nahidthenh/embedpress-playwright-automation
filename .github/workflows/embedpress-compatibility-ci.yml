name: EmbedPress Compatibility CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  compatibility-test:
    name: WP ${{ matrix.wordpress }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    outputs:
      test-result: ${{ steps.test-result.outputs.result }}

    strategy:
      fail-fast: false
      matrix:
        wordpress: ['latest', '6.5']
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']
    
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
      - name: Checkout plugin code
        uses: actions/checkout@v4
        with:
          path: embedpress
      
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, mbstring, xml, curl, zip, intl, gd
          coverage: none
          tools: composer, wp-cli
      
      - name: Verify PHP version
        run: |
          php -v
          wp --version
      
      - name: Setup WordPress
        run: |
          # Download WordPress
          wp core download --version=${{ matrix.wordpress }} --path=/tmp/wordpress
          
          # Create wp-config.php
          wp config create \
            --path=/tmp/wordpress \
            --dbname=wordpress_test \
            --dbuser=root \
            --dbpass=root \
            --dbhost=127.0.0.1:3306 \
            --skip-check
          
          # Install WordPress
          wp core install \
            --path=/tmp/wordpress \
            --url=http://localhost \
            --title="EmbedPress CI Test" \
            --admin_user=admin \
            --admin_password=admin \
            --admin_email=test@example.com \
            --skip-email
          
          # Enable debug mode
          wp config set WP_DEBUG true --raw --path=/tmp/wordpress
          wp config set WP_DEBUG_LOG true --raw --path=/tmp/wordpress
          wp config set WP_DEBUG_DISPLAY false --raw --path=/tmp/wordpress
          
          echo "✅ WordPress ${{ matrix.wordpress }} installed successfully"
      
      - name: Copy plugin to WordPress
        run: |
          mkdir -p /tmp/wordpress/wp-content/plugins/embedpress
          cp -r embedpress/* /tmp/wordpress/wp-content/plugins/embedpress/
          echo "✅ Plugin copied to WordPress plugins directory"
      
      - name: Check PHP syntax (non-blocking)
        id: syntax-check
        continue-on-error: true
        run: |
          echo "🔍 Checking PHP syntax for all plugin files..."
          SYNTAX_ERRORS=0

          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "⚠️  Syntax error in: $file"
              SYNTAX_ERRORS=$((SYNTAX_ERRORS + 1))
            fi
          done < <(find /tmp/wordpress/wp-content/plugins/embedpress -name "*.php")

          if [ $SYNTAX_ERRORS -gt 0 ]; then
            echo "⚠️  Found $SYNTAX_ERRORS file(s) with syntax errors"
            echo "syntax_errors=$SYNTAX_ERRORS" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ No PHP syntax errors found"
            echo "syntax_errors=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Activate plugin
        id: activate-plugin
        continue-on-error: true
        run: |
          echo "🔌 Activating EmbedPress plugin..."

          # Capture activation output and errors
          ACTIVATION_OUTPUT=$(wp plugin activate embedpress --path=/tmp/wordpress 2>&1)
          ACTIVATION_STATUS=$?

          echo "$ACTIVATION_OUTPUT"

          if [ $ACTIVATION_STATUS -ne 0 ]; then
            echo "❌ Plugin activation failed!"
            echo "activation_failed=true" >> $GITHUB_OUTPUT

            # Check for fatal errors
            if echo "$ACTIVATION_OUTPUT" | grep -i "fatal error"; then
              echo "💥 Fatal error detected during activation"
              echo "fatal_error=true" >> $GITHUB_OUTPUT
            fi
            exit 1
          fi

          echo "✅ Plugin activated successfully"
          echo "activation_failed=false" >> $GITHUB_OUTPUT
          echo "fatal_error=false" >> $GITHUB_OUTPUT
      
      - name: Verify plugin is active
        id: verify-active
        continue-on-error: true
        if: steps.activate-plugin.outcome == 'success'
        run: |
          echo "🔍 Verifying plugin activation..."
          wp plugin list --path=/tmp/wordpress --status=active --format=csv | grep embedpress

          if [ $? -ne 0 ]; then
            echo "❌ Plugin is not in active plugins list!"
            echo "verification_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "✅ Plugin is active"
          echo "verification_failed=false" >> $GITHUB_OUTPUT
      
      - name: Check WordPress health
        id: health-check
        continue-on-error: true
        if: steps.activate-plugin.outcome == 'success'
        run: |
          echo "🏥 Checking WordPress health..."

          # Verify WordPress is still functional
          wp option get siteurl --path=/tmp/wordpress

          if [ $? -ne 0 ]; then
            echo "❌ WordPress is not responding!"
            echo "health_check_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "✅ WordPress is healthy"
          echo "health_check_failed=false" >> $GITHUB_OUTPUT
      
      - name: Test REST API
        id: rest-api-test
        continue-on-error: true
        if: steps.activate-plugin.outcome == 'success'
        run: |
          echo "🌐 Testing WordPress REST API..."

          # Start PHP built-in server in background
          php -S localhost:8080 -t /tmp/wordpress > /tmp/php-server.log 2>&1 &
          PHP_SERVER_PID=$!
          sleep 3

          # Test REST API endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/wp-json/)

          kill $PHP_SERVER_PID 2>/dev/null || true

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ REST API returned HTTP $HTTP_CODE"
            echo "rest_api_failed=true" >> $GITHUB_OUTPUT

            # Check for fatal errors in server log
            if grep -i "fatal error" /tmp/php-server.log; then
              echo "💥 Fatal error detected in REST API"
              echo "fatal_error=true" >> $GITHUB_OUTPUT
            fi
            exit 1
          fi
          echo "✅ REST API is working (HTTP 200)"
          echo "rest_api_failed=false" >> $GITHUB_OUTPUT
      
      - name: Verify Plugin Activation & Check for Fatal Errors
        id: fatal-error-check
        continue-on-error: true
        if: steps.activate-plugin.outcome == 'success'
        run: |
          echo "� Verifying plugin activation and checking for fatal errors..."

          # Check if plugin is actually active
          if ! wp plugin is-active embedpress --path=/tmp/wordpress; then
            echo "❌ Plugin failed to activate properly!"
            echo "fatal_error_detected=true" >> $GITHUB_OUTPUT
            exit 1
          fi

          DEBUG_LOG="/tmp/wordpress/wp-content/debug.log"

          if [ -f "$DEBUG_LOG" ]; then
            echo "📋 Debug log exists, checking for fatal errors..."

            # Check for fatal errors
            if grep -i "fatal error\|parse error" "$DEBUG_LOG"; then
              echo "💥 Fatal errors found in debug log!"
              cat "$DEBUG_LOG"
              echo "fatal_error_detected=true" >> $GITHUB_OUTPUT
              exit 1
            fi

            # Check for warnings (informational only)
            if grep -i "warning" "$DEBUG_LOG"; then
              echo "⚠️  Warnings found in debug log (non-blocking):"
              grep -i "warning" "$DEBUG_LOG" | head -10
            fi

            echo "✅ No fatal errors in debug log"
          else
            echo "✅ No debug log file (no errors occurred)"
          fi

          echo "fatal_error_detected=false" >> $GITHUB_OUTPUT

      - name: Test plugin deactivation
        id: deactivate-plugin
        continue-on-error: true
        if: steps.fatal-error-check.outcome == 'success'
        run: |
          echo "🔌 Testing plugin deactivation..."
          wp plugin deactivate embedpress --path=/tmp/wordpress

          if [ $? -ne 0 ]; then
            echo "❌ Plugin deactivation failed!"
            echo "deactivation_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "✅ Plugin deactivated successfully"
          echo "deactivation_failed=false" >> $GITHUB_OUTPUT

      - name: Test plugin reactivation
        id: reactivate-plugin
        continue-on-error: true
        if: steps.deactivate-plugin.outcome == 'success'
        run: |
          echo "🔌 Testing plugin reactivation..."
          wp plugin activate embedpress --path=/tmp/wordpress

          if [ $? -ne 0 ]; then
            echo "❌ Plugin reactivation failed!"
            echo "reactivation_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "✅ Plugin reactivated successfully"
          echo "reactivation_failed=false" >> $GITHUB_OUTPUT

      - name: Run plugin integrity check
        run: |
          echo "🔍 Running plugin integrity checks..."

          # Check if main plugin file exists
          if [ ! -f "/tmp/wordpress/wp-content/plugins/embedpress/embedpress.php" ]; then
            echo "❌ Main plugin file not found!"
            exit 1
          fi

          # Verify plugin has required headers
          grep -q "Plugin Name:" /tmp/wordpress/wp-content/plugins/embedpress/embedpress.php
          if [ $? -ne 0 ]; then
            echo "❌ Plugin headers missing!"
            exit 1
          fi

          # Check plugin version
          PLUGIN_VERSION=$(wp plugin get embedpress --field=version --path=/tmp/wordpress)
          echo "Plugin Version: $PLUGIN_VERSION"

          # List all plugin files
          FILE_COUNT=$(find /tmp/wordpress/wp-content/plugins/embedpress -type f | wc -l)
          echo "Total plugin files: $FILE_COUNT"

          if [ "$FILE_COUNT" -lt 1 ]; then
            echo "❌ Plugin appears to be empty!"
            exit 1
          fi

          echo "✅ Plugin integrity check passed"

      - name: Final WordPress status
        run: |
          echo "📊 Final WordPress Status Report"
          echo "=================================="
          wp core version --path=/tmp/wordpress
          wp plugin list --path=/tmp/wordpress
          echo "=================================="
          echo "✅ All compatibility tests passed!"

      - name: Set test result output
        id: test-result
        if: always()
        run: |
          # Determine overall status and failure reason
          FAILURE_REASON=""

          if [ "${{ steps.syntax-check.outcome }}" == "failure" ]; then
            FAILURE_REASON="Syntax errors"
          elif [ "${{ steps.activate-plugin.outcome }}" == "failure" ]; then
            FAILURE_REASON="Activation failed"
          elif [ "${{ steps.fatal-error-check.outcome }}" == "failure" ]; then
            FAILURE_REASON="Fatal runtime error"
          elif [ "${{ steps.verify-active.outcome }}" == "failure" ]; then
            FAILURE_REASON="Plugin not active"
          elif [ "${{ steps.health-check.outcome }}" == "failure" ]; then
            FAILURE_REASON="WordPress health check failed"
          elif [ "${{ steps.rest-api-test.outcome }}" == "failure" ]; then
            FAILURE_REASON="REST API failed"
          elif [ "${{ steps.deactivate-plugin.outcome }}" == "failure" ]; then
            FAILURE_REASON="Deactivation failed"
          elif [ "${{ steps.reactivate-plugin.outcome }}" == "failure" ]; then
            FAILURE_REASON="Reactivation failed"
          fi

          if [ -z "$FAILURE_REASON" ]; then
            echo "result=✅ PASSED" >> $GITHUB_OUTPUT
            echo "status=success" >> $GITHUB_OUTPUT
            echo "reason=All tests passed" >> $GITHUB_OUTPUT
          else
            echo "result=❌ FAILED" >> $GITHUB_OUTPUT
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "reason=$FAILURE_REASON" >> $GITHUB_OUTPUT
          fi

      - name: Upload debug log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-log-wp${{ matrix.wordpress }}-php${{ matrix.php }}
          path: /tmp/wordpress/wp-content/debug.log
          if-no-files-found: ignore
          retention-days: 7

  # Slack notification job that runs after all tests complete
  notify-slack:
    name: Send Slack Notification
    needs: compatibility-test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Collect test results
        id: collect-results
        run: |
          # Count total jobs
          TOTAL_JOBS=12  # 2 WP versions × 6 PHP versions

          # Get job results from needs context
          RESULTS='${{ toJSON(needs.compatibility-test.result) }}'
          OUTPUTS='${{ toJSON(needs.compatibility-test.outputs) }}'

          echo "Job result: $RESULTS"
          echo "Job outputs: $OUTPUTS"

          # Determine pass/fail counts
          if [ "$RESULTS" == "\"success\"" ]; then
            PASSED=$TOTAL_JOBS
            FAILED=0
            STATUS="✅ ALL TESTS PASSED"
            COLOR="good"
          elif [ "$RESULTS" == "\"failure\"" ]; then
            # Some tests failed - we'll show partial results
            # Since we can't easily count individual matrix results, we'll indicate partial failure
            PASSED="Some"
            FAILED="Some"
            STATUS="⚠️ PARTIAL FAILURE"
            COLOR="warning"
          else
            # Cancelled or skipped
            PASSED=0
            FAILED=0
            STATUS="⏭️ TESTS SKIPPED/CANCELLED"
            COLOR="#808080"
          fi

          echo "total=$TOTAL_JOBS" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Build test matrix summary
          MATRIX_SUMMARY="*Test Matrix:*\n"
          MATRIX_SUMMARY+="• WordPress: latest, 6.5\n"
          MATRIX_SUMMARY+="• PHP: 7.4, 8.0, 8.1, 8.2, 8.3, 8.4\n"
          MATRIX_SUMMARY+="• Total Combinations: ${{ steps.collect-results.outputs.total }}"

          # Build workflow URL
          WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Create Slack message payload
          PAYLOAD=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "${{ steps.collect-results.outputs.color }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "🔌 EmbedPress Compatibility CI Results",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Status:* ${{ steps.collect-results.outputs.status }}\n\n$MATRIX_SUMMARY"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*✅ Passed:*\n${{ steps.collect-results.outputs.passed }}/${{ steps.collect-results.outputs.total }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*❌ Failed:*\n${{ steps.collect-results.outputs.failed }}/${{ steps.collect-results.outputs.total }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*🌿 Branch:*\n${{ github.ref_name }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*👤 Triggered by:*\n${{ github.actor }}"
                      }
                    ]
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*📝 Commit:* ${{ github.event.head_commit.message || 'N/A' }}"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*🕒 Executed:* $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
                    }
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "View Workflow Run",
                          "emoji": true
                        },
                        "url": "$WORKFLOW_URL",
                        "style": "primary"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )

          # Send to Slack
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"

          echo "✅ Slack notification sent successfully!"

